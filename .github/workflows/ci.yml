name: CI

on:
  push:
  pull_request:

jobs:
  mobile-and-backend:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      OPENAI_API_KEY: mock-key-for-testing
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      MONGO_URI: mongodb://localhost:27017/affirmation_test_integration
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present