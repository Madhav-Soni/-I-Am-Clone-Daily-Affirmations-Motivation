name: CI

on:
  push:
  pull_request:

jobs:
  mobile-and-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present

      - name: Typecheck
        run: npm run typecheck --if-present